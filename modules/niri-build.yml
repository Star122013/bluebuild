---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json

type: script
snippets:
  - >-
    dnf install -y
    cargo
    clang
    gcc
    git
    rustc
    cairo-gobject-devel
    dbus-devel
    fontconfig-devel
    libXcursor-devel
    libadwaita-devel
    libdisplay-info-devel
    libinput-devel
    libseat-devel
    libudev-devel
    libxkbcommon-devel
    mesa-libEGL-devel
    mesa-libgbm-devel
    pango-devel
    pipewire-devel
    systemd-devel
    wayland-devel
  - git clone --branch wip/branch --depth 1 https://github.com/niri-wm/niri.git /tmp/niri
  - cargo build --manifest-path /tmp/niri/Cargo.toml --release --bin niri
  - mkdir -p /out/runtime
  - install -Dm755 /tmp/niri/target/release/niri /out/niri
  - install -Dm755 /tmp/niri/resources/niri-session /out/runtime/usr/bin/niri-session
  - install -Dm644 /tmp/niri/resources/niri.desktop /out/runtime/usr/share/wayland-sessions/niri.desktop
  - install -Dm644 /tmp/niri/resources/niri-portals.conf /out/runtime/usr/share/xdg-desktop-portal/niri-portals.conf
  - install -Dm644 /tmp/niri/resources/niri.service /out/runtime/usr/lib/systemd/user/niri.service
  - install -Dm644 /tmp/niri/resources/niri-shutdown.target /out/runtime/usr/lib/systemd/user/niri-shutdown.target
