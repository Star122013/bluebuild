---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json

type: script
snippets:
  - >-
    dnf install -y
    cargo
    clang
    gcc
    git
    rustc
    cairo-gobject-devel
    dbus-devel
    fontconfig-devel
    libXcursor-devel
    libadwaita-devel
    libdisplay-info-devel
    libinput-devel
    libseat-devel
    libudev-devel
    libxkbcommon-devel
    mesa-libEGL-devel
    mesa-libgbm-devel
    pango-devel
    pipewire-devel
    systemd-devel
    wayland-devel
    && git clone --branch wip/branch --depth 1 https://github.com/niri-wm/niri.git /tmp/niri
    && cd /tmp/niri
    && cargo build --release --bin niri
    && install -Dm755 target/release/niri /out/usr/bin/niri
    && install -Dm755 resources/niri-session /out/usr/bin/niri-session
    && install -Dm644 resources/niri.desktop /out/usr/share/wayland-sessions/niri.desktop
    && install -Dm644 resources/niri-portals.conf /out/usr/share/xdg-desktop-portal/niri-portals.conf
    && install -Dm644 resources/niri.service /out/usr/lib/systemd/user/niri.service
    && install -Dm644 resources/niri-shutdown.target /out/usr/lib/systemd/user/niri-shutdown.target
