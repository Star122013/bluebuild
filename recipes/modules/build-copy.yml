---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: copy
    from: niri-build
    src: /out/niri
    dest: /usr/bin/

  - type: copy
    from: niri-build
    src: /out/runtime
    dest: /

  - type: copy
    from: rmpc-build
    src: /out/rmpc
    dest: /usr/bin/

  - type: copy
    from: helix-steel
    src: /out/hx
    dest: /usr/bin
