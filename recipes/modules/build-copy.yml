---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: copy
    from: niri-build
    src: /out/niri
    dest: /usr/bin/

  - type: copy
    from: niri-build
    src: /out/runtime
    dest: /

  - type: copy
    from: rmpc-build
    src: /out/rmpc
    dest: /usr/bin/

  - type: copy
    from: flow-build
    src: /out/flow
    dest: /usr/bin/

  - type: copy
    from: tree-sitter-build
    src: /out/tree-sitter
    dest: /

  - type: copy
    from: nvim-build
    src: /out/nvim
    dest: /usr/bin/

  - type: copy
    from: nvim-build
    src: /out/nvim-runtime
    dest: /

  - type: copy
    from: zvm-build
    src: /out/zvm
    dest: /usr/bin/
