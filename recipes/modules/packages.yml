---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json

type: dnf
repos:
  files:
    - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    - https://sing-box.app/sing-box.repo
  copr:
    - agriffis/neovim-nightly 
    - qwerhyy/misc-packages 
    - atim/starship
    - jdxcode/mise
    - alternateved/cliphist
    - leloubil/wl-clip-persist
    - liusen/Throne
    - aldantanneo/jj-vcs
    - scottames/ghostty
    - scottames/awww
    - errornointernet/quickshell
    - solopasha/hyprland
    - peterwu/rendezvous
    - lihaohong/yazi
    - jkinred/satty
    - dulikiles/vicinae
    - zhullyb/v2rayA
    - atim/nushell
    - sneexy/zen-browser
    - ama1470/kwin-effects-glass
group-install:
  with-optional: false
  packages:
    - virtualization
install:
  packages:
    - https://vscode.download.prss.microsoft.com/dbazure/download/stable/07ff9d6178ede9a1bd12ad3399074d726ebe6e43/code-1.112.0-1773778396.el8.x86_64.rpm
    - https://github.com/chen08209/FlClash/releases/download/v0.8.92/FlClash-0.8.92-linux-amd64.rpm
    - tree-sitter
    - terra-release
    - noctalia-shell-git
    - matugen
    - noctalia-qs
    - brightnessctl
    - gpu-screen-recorder
    - ImageMagick
    - qt6-qtmultimedia
    - cava
    # network
    - Throne
    - dae
    - sing-box
    # editors
    - neovim
    - helix
    # python
    - uv
    - pixi
    # shell-tools
    - mise
    - mpd
    - fastfetch
    - bat
    - zoxide
    - yazi
    - fzf
    - ripgrep
    - fd-find
    - git
    - jj-cli
    - zsh
    - nushell
    - starship
    # niri runtime helpers
    - fuzzel
    - zen-browser
    - gnome-keyring
    - nautilus
    - os-prober
    - polkit-kde
    - grim
    - slurp
    - satty
    - vicinae
    # runtime libs for custom-built niri (source builds don't auto-pull RPM deps)
    - libinput
    - libseat
    - mesa-libgbm
    - pipewire-libs
    - cliphist
    - wl-clip-persist
    # portal
    - xdg-desktop-portal-gnome
    - xdg-desktop-portal-gtk
    - xwayland-satellite
    # misc
    - kwin-effects-glass
    - kitty
    - kitty-terminfo
    - ghostty
    - awww
    - nwg-look
    - qt6ct
    - adw-gtk3-theme
    - bibata-cursor-themes
remove:
  packages:
    # example: removing firefox (in favor of the flatpak)
    # "firefox" is the main package, "firefox-langpacks" is a dependency
    - firefox
    - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
    # kde apps (keep plasma desktop core, strip common user apps)
    - dolphin
    - dragon
    - elisa-player
    - kjournald
    - gwenview
    - kate
    - kcalc
    - khelpcenter
    - konsole
    - okular
    - spectacle
    # strip extra KDE user apps/welcome glue, keep only desktop shell core
    - plasma-welcome
    - xwaylandvideobridge
    - kcharselect
    - kcolorchooser
