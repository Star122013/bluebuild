---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json

type: dnf
repos:
  files:
    - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    - https://sing-box.app/sing-box.repo
  copr:
    - atim/starship
    - alternateved/cliphist
    - leloubil/wl-clip-persist
    - liusen/Throne
    - aldantanneo/jj-vcs
    - scottames/ghostty
    - scottames/awww
    - errornointernet/quickshell
    - solopasha/hyprland
    - peterwu/rendezvous
    - lihaohong/yazi
    - jkinred/satty
    - dulikiles/vicinae
    - zhullyb/v2rayA
install:
  packages:
    - https://github.com/chen08209/FlClash/releases/download/v0.8.92/FlClash-0.8.92-linux-amd64.rpm
    - terra-release
    - noctalia-shell
    - Throne
    - dae
    - sing-box
    # editors
    - neovim
    - helix
    # shell-tools
    - fastfetch
    - bat
    - zoxide
    - yazi
    - fzf
    - ripgrep
    - fd-find
    - git
    - jj-cli
    - zsh
    - starship
    # niri runtime helpers
    - fuzzel
    - gnome-keyring
    - nautilus
    - os-prober
    - polkit-kde
    - grim
    - slurp
    - satty
    - vicinae
    # runtime libs for custom-built niri (source builds don't auto-pull RPM deps)
    - libinput
    - libseat
    - mesa-libgbm
    - pipewire-libs
    - cliphist
    - wl-clip-persist
    # portal
    - xdg-desktop-portal-gnome
    - xdg-desktop-portal-gtk
    - xwayland-satellite
    # misc
    - kitty
    - ghostty
    - awww
    - nwg-look
    - qt6ct
    - adw-gtk3-theme
    - bibata-cursor-themes
remove:
  packages:
    # example: removing firefox (in favor of the flatpak)
    # "firefox" is the main package, "firefox-langpacks" is a dependency
    - firefox
    - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
    # kde apps (keep plasma desktop core, strip common user apps)
    - ark
    - dolphin
    - dragon
    - elisa-player
    - kjournald
    - gwenview
    - kate
    - kcalc
    - khelpcenter
    - konsole
    - okular
    - plasma-discover
    - spectacle
    # strip extra KDE user apps/welcome glue, keep only desktop shell core
    - plasma-welcome
    - xwaylandvideobridge
    - kcharselect
    - kcolorchooser
    - kfind
    - kolourpaint
    - krdc
    - krfb
    - kwrite
    - kmahjongg
    - kmines
    - kpat
    - skanpage
