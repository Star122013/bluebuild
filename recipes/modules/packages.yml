---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json

type: dnf
repos:
  files:
    - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    - https://sing-box.app/sing-box.repo
  copr:
    - anatta/television
    - aldantanneo/jj-vcs
    - alternateved/cliphist
    - ama1470/kwin-effects-glass
    - atim/nushell
    - atim/starship
    - dulikiles/vicinae
    - errornointernet/quickshell
    - jdxcode/mise
    - jkinred/satty
    - leloubil/wl-clip-persist
    - lihaohong/yazi
    - liusen/Throne
    - matinlotfali/KDE-Rounded-Corners
    - peterwu/rendezvous
    - qwerhyy/misc-packages
    - scottames/awww
    - scottames/ghostty
    - sneexy/zen-browser
    - varlad/zellij
    - solopasha/hyprland
    - zhullyb/v2rayA

group-install:
  with-optional: false
  packages:
    - virtualization

install:
  packages:
    # Third-party RPM URLs
    - https://vscode.download.prss.microsoft.com/dbazure/download/stable/07ff9d6178ede9a1bd12ad3399074d726ebe6e43/code-1.112.0-1773778396.el8.x86_64.rpm
    - https://github.com/chen08209/FlClash/releases/download/v0.8.92/FlClash-0.8.92-linux-amd64.rpm
    - https://github.com/tmuxpack/tpack/releases/download/v0.8.2/tpack_0.8.2_linux_amd64.rpm
    - https://github.com/bggRGjQaUbCoE/PiliPlus/releases/download/2.0.3.1/PiliPlus_linux_2.0.3+4836_amd64.rpm
    # Base packages
    - terra-release
    - noctalia-shell-git
    - matugen
    - noctalia-qs
    - brightnessctl
    - gpu-screen-recorder
    - ImageMagick
    - qt6-qtmultimedia
    - cava

    # Network
    - Throne
    - dae
    - sing-box

    # Editors
    - helix
    - zed

    # Python
    - uv
    - pixi

    # Build tools
    - perl-FindBin
    - openssl-devel
    - pkgconf-pkg-config
    - gcc
    - make
    - perl-File-Compare
    - perl-File-Copy   
    - perl-IPC-Cmd  
    - perl-Time-HiRes
    - perl-Time-Piece

    # Shell tools
    - zellij
    - rustup
    - mise
    - mpd
    - fastfetch
    - btop
    - eza
    - bat
    - zoxide
    - yazi
    - fzf
    - ripgrep
    - fd-find
    - git
    - jj-cli
    - zsh
    - nushell
    - starship
    - television
    - image-builder

    # Niri runtime helpers
    - fuzzel
    - zen-browser
    - gnome-keyring
    - nautilus
    - os-prober
    - polkit-kde
    - grim
    - slurp
    - satty
    - vicinae
    - waybar
    - swaync

    # Runtime libs for custom-built niri (source builds don't auto-pull RPM deps)
    - libinput
    - libseat
    - mesa-libgbm
    - pipewire-libs
    - cliphist
    - wl-clip-persist

    # Portal
    - xdg-desktop-portal-gnome
    - xdg-desktop-portal-gtk
    - xwayland-satellite

    # Misc
    - foot
    - kwin-effect-roundcorners
    - kwin-effects-glass
    - kitty
    - kitty-terminfo
    - ghostty
    - awww
    - nwg-look
    - qt6ct
    - adw-gtk3-theme
    - bibata-cursor-themes
    - gtk-murrine-engine

remove:
  packages:
    # example: removing firefox (in favor of the flatpak)
    # "firefox" is the main package, "firefox-langpacks" is a dependency
    - firefox
    - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
    # kde apps (keep plasma desktop core, strip common user apps)
    - dolphin
    - dragon
    - elisa-player
    - kjournald
    - gwenview
    - kate
    - kcalc
    - khelpcenter
    - konsole
    - okular
    - spectacle
    # strip extra KDE user apps/welcome glue, keep only desktop shell core
    - plasma-welcome
    - xwaylandvideobridge
    - kcharselect
    - kcolorchooser
