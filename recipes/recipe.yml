---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: niri-desktop
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/blue-build/base-images/fedora-kinoite
image-version: latest # latest is also supported if you want new updates ASAP

stages:
  - name: niri-build
    from: registry.fedoraproject.org/fedora:43
    modules:
      - type: rust-build
        source: local
        repository: "https://github.com/niri-wm/niri.git"
        branch: "wip/branch"
        cargo_bin: "niri"
        output_bin: "/out/niri"
        dnf_deps:
          - cairo-gobject-devel
          - dbus-devel
          - fontconfig-devel
          - libXcursor-devel
          - libadwaita-devel
          - libdisplay-info-devel
          - libinput-devel
          - libseat-devel
          - libudev-devel
          - libxkbcommon-devel
          - mesa-libEGL-devel
          - mesa-libgbm-devel
          - pango-devel
          - pipewire-devel
          - systemd-devel
          - wayland-devel
        # Keep the old niri-build runtime layout under /out/runtime for later copy steps.
        artifacts:
          - source: resources/niri-session
            dest: /out/runtime/usr/bin/niri-session
            mode: "755"
          - source: resources/niri.desktop
            dest: /out/runtime/usr/share/wayland-sessions/niri.desktop
            mode: "644"
          - source: resources/niri-portals.conf
            dest: /out/runtime/usr/share/xdg-desktop-portal/niri-portals.conf
            mode: "644"
          - source: resources/niri.service
            dest: /out/runtime/usr/lib/systemd/user/niri.service
            mode: "644"
          - source: resources/niri-shutdown.target
            dest: /out/runtime/usr/lib/systemd/user/niri-shutdown.target
            mode: "644"
  - name: rmpc-build
    from: registry.fedoraproject.org/fedora:43
    modules:
      - type: rust-build
        source: local
        repository: "https://github.com/mierak/rmpc.git"
        branch: "master"
        cargo_bin: "rmpc"
        output_bin: "/out/rmpc"
  - name: flow-build
    from: registry.fedoraproject.org/fedora:43
    modules:
      - type: zig-build
        source: local
        repository: "https://github.com/neurocyte/flow.git"
        branch: "master"
        zig_bin: "flow"
        output_bin: "/out/flow"
        build_cmd:
          - zig
          - build
          - -Doptimize=ReleaseSafe
  - name: tree-sitter-build
    from: registry.fedoraproject.org/fedora:43
    modules:
      - type: zig-build
        source: local
        repository: "https://github.com/tree-sitter/tree-sitter.git"
        branch: "release-0.26"
        zig_bin: "tree-sitter"
        build_cmd:
          - zig
          - build
          - -Doptimize=ReleaseFast
          - -Dbuild-shared=true
        artifacts:
          - source: zig-out/lib/libtree-sitter.so
            dest: /out/tree-sitter/usr/lib64/libtree-sitter.so
            mode: "755"
          - source: zig-out/include
            dest: /out/tree-sitter/usr/include
      - type: rust-build
        source: local
        repository: "https://github.com/tree-sitter/tree-sitter.git"
        branch: "release-0.26"
        cargo_bin: "tree-sitter"
        output_bin: "/out/tree-sitter/usr/bin/tree-sitter"
  - name: nvim-build
    from: registry.fedoraproject.org/fedora:43
    modules:
      - type: zig-build
        source: local
        repository: "https://github.com/neovim/neovim.git"
        branch: "master"
        zig_bin: "nvim"
        build_cmd:
          - zig
          - build
          - install
          - -Doptimize=ReleaseFast
          - --prefix
          - /tmp/nvim-install
        artifacts:
          - source: /tmp/nvim-install/bin/nvim
            dest: /out/nvim
            mode: "755"
          - source: /tmp/nvim-install/share/nvim/runtime
            dest: /out/nvim-runtime/usr/share/nvim/runtime
  - name: zvm-build
    from: registry.fedoraproject.org/fedora:44
    modules: 
      - type: go-build
        source: local
        repository: https://github.com/tristanisham/zvm.git
        branch: master
        build_cmd: "go build -o ./build/nvm ."
        

# module configuration, executed in order
# you can include multiple instances of the same module
modules:

  - from-file: modules/build-copy.yml
  - from-file: modules/bling.yml
  - from-file: modules/kernel.yml
  - from-file: modules/packages.yml
  - from-file: modules/base-files.yml
  - from-file: modules/polkit-agent.yml
  # - from-file: modules/kde-cleanup.yml
  - from-file: modules/grub-theme-local.yml
  - from-file: modules/icons-whitesur.yml
  - from-file: modules/fcitx5-theme-ori.yml
  - from-file: modules/fonts.yml
  - from-file: modules/gschema-overrides.yml
  - from-file: modules/brew.yml
  - from-file: modules/chezmoi.yml
  - from-file: modules/flatpaks.yml
  - from-file: modules/flatpak-overrides.yml
  - from-file: modules/os-release.yml
  - from-file: modules/signing.yml
