---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: niri-desktop
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/blue-build/base-images/fedora-kinoite
image-version: latest # latest is also supported if you want new updates ASAP

stages:
  - name: niri-build
    from: registry.fedoraproject.org/fedora:43
    modules:
      - type: script
        snippets:
          - >-
            dnf install -y
            cargo
            clang
            gcc
            git
            rustc
            cairo-gobject-devel
            dbus-devel
            fontconfig-devel
            libXcursor-devel
            libadwaita-devel
            libdisplay-info-devel
            libinput-devel
            libseat-devel
            libudev-devel
            libxkbcommon-devel
            mesa-libEGL-devel
            mesa-libgbm-devel
            pango-devel
            pipewire-devel
            systemd-devel
            wayland-devel
          - git clone --branch wip/branch --depth 1 https://github.com/niri-wm/niri.git /tmp/niri
          - cargo build --manifest-path /tmp/niri/Cargo.toml --release --bin niri
          - mkdir -p /out/runtime
          - install -Dm755 /tmp/niri/target/release/niri /out/niri
          - install -Dm755 /tmp/niri/resources/niri-session /out/runtime/usr/bin/niri-session
          - install -Dm644 /tmp/niri/resources/niri.desktop /out/runtime/usr/share/wayland-sessions/niri.desktop
          - install -Dm644 /tmp/niri/resources/niri-portals.conf /out/runtime/usr/share/xdg-desktop-portal/niri-portals.conf
          - install -Dm644 /tmp/niri/resources/niri.service /out/runtime/usr/lib/systemd/user/niri.service
          - install -Dm644 /tmp/niri/resources/niri-shutdown.target /out/runtime/usr/lib/systemd/user/niri-shutdown.target

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - from-file: ../modules/base-files.yml

  - from-file: ../modules/niri-copy.yml

  - from-file: ../modules/kernel.yml
  - from-file: ../modules/packages.yml
  - from-file: ../modules/icons-whitesur.yml
  - from-file: ../modules/fonts.yml
  - from-file: ../modules/gschema-overrides.yml
  - from-file: ../modules/brew.yml
  - from-file: ../modules/chezmoi.yml
  - from-file: ../modules/flatpaks.yml
  - from-file: ../modules/flatpak-overrides.yml
  - from-file: ../modules/os-release.yml
  - from-file: ../modules/signing.yml
